<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>برنامه‌ریزی روزانه</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  
</head>
<body>
  
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/for-my-bro-/sw.js');
}
</script>

  
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="date-pill">
      <span id="dateStr"></span>
      <span id="clockStr" class="clock"></span>
    </div>
    <h1 class="title">برنامه‌ریزی روزانه</h1>
    <div id="saveFlash" class="save-flash hidden">✓ اطلاعات روز ذخیره شد</div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="planner">📋 برنامه‌ریز</button>
    <button class="tab-btn" data-tab="scheduler">⏰ زمان‌بندی</button>
    <button class="tab-btn" data-tab="chart">📊 نمودار</button>
  </div>

  <!-- ── PLANNER TAB ── -->
  <div class="tab-content active" id="tab-planner">

    <!-- Progress ring -->
    <div class="progress-wrap">
      <div class="ring-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="10"/>
          <circle id="ringArc" cx="50" cy="50" r="42" fill="none" stroke="url(#pg)" stroke-width="10"
            stroke-dasharray="263.9" stroke-dashoffset="263.9"
            stroke-linecap="round" transform="rotate(-90 50 50)"/>
          <defs>
            <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="100%" stop-color="#60a5fa"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
      <div class="progress-info">
        <div class="info-today">امروز</div>
        <div class="info-count" id="infoCount">0 از 0 کار</div>
        <div class="info-stars" id="infoStars">0 از 0 ستاره</div>
        <div class="info-msg" id="infoMsg">🌅 روزت رو شروع کن!</div>
      </div>
    </div>

    <!-- Task list -->
    <div class="card">
      <div class="card-title">کارهای امروز</div>
      <div id="taskList"></div>
      <div class="add-task-wrap">
        <div class="add-row">
          <input id="newTaskInput" class="text-input" placeholder="افزودن کار جدید..." />
          <button class="add-btn" id="addTaskBtn">+</button>
        </div>
        <div class="star-row">
          <span class="star-label">ضریب کار جدید:</span>
          <div class="star-picker" id="newStarPicker" data-value="3"></div>
          <span class="star-count" id="newStarCount">3 ستاره</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SCHEDULER TAB ── -->
  <div class="tab-content" id="tab-scheduler">
    <div class="card">
      <div class="card-header-row">
        <div class="card-title">📅 برنامه‌ریزی یادآورها</div>
        <div class="badge" id="activeCount">0 فعال</div>
      </div>

      <div class="midnight-box">
        <div>
          <div class="midnight-title">🌙 ذخیره خودکار ۱۲ شب تهران</div>
          <div class="midnight-last" id="lastSaveInfo"></div>
        </div>
        <div class="countdown-wrap">
          <div class="countdown-label">تا ذخیره بعدی</div>
          <div class="countdown" id="countdown">00:00:00</div>
        </div>
      </div>

      <div id="reminderList"></div>

      <div class="custom-reminder">
        <div class="custom-label">افزودن یادآور سفارشی</div>
        <div class="custom-row">
          <input id="customLabelInput" class="text-input" placeholder="عنوان یادآور..." />
          <input type="time" id="customTimeInput" class="time-input" />
        </div>
        <button class="add-reminder-btn" id="addReminderBtn">+ افزودن یادآور</button>
      </div>
    </div>
  </div>

  <!-- ── CHART TAB ── -->
  <div class="tab-content" id="tab-chart">
    <div class="card chart-card">
      <div class="chart-tabs">
        <button class="chart-tab active" data-chart="weekly">هفتگی</button>
        <button class="chart-tab" data-chart="monthly">ماهانه</button>
        <button class="chart-tab" data-chart="yearly">سالانه</button>
        <button class="chart-tab" data-chart="alltime">کل</button>
      </div>
      <div class="chart-title" id="chartTitle">۷ روز گذشته</div>
      <canvas id="mainChart" height="180"></canvas>
      <div class="chart-note" id="chartNote">درصد بر اساس مجموع ضریب‌های انجام‌شده</div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
